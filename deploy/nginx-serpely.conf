server {
    listen 80;
    server_name serpely.com www.serpely.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name serpely.com www.serpely.com;

    ssl_certificate /etc/letsencrypt/live/serpely.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/serpely.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/serpely/app/dist;
    index index.html;

    # Static assets with cache + CORS (needed for Vite module scripts with crossorigin)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, Content-Type";
    }

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded files
    location /uploads/ {
        alias /var/www/serpely/server/uploads/;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
